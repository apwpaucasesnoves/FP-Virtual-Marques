<!DOCTYPE html>

<html>

<body>

<h1>Formulari HTML</h1>

<form action="mailto:correu@servidor.com" method="post" name="fproves" id="fproves" onsubmit="return validar()">




  Nom: <input type="text" id="nom" name="nom"><br>

  <p>Sexe:</p>

  <input type="radio" id="femeni" name="sexe" value="F">Femeni<br>

  <input type="radio" id="no" name="sexe" value="N">No vol respondre<br>

  <p>Idiomes que domines (marca tots els necessaris):</p>

  <input type="checkbox" id="es" name="es" value="es">Castellà<br>

Estudis: 

<select id="estudis">

  <option value="s">CFGS</option>

 <br>

</form> 

   

 <script>

  function validar()

    {  //Comprovem mida del nom entre 5 i 30

        var nom = document.forms["fproves"]["nom"].value;

        if (nom.length < 5)

        {

          alert("El teu nom és massa curt.");

          return false;

        } else {

          if (nom.length > 30)

          {

            alert("El teu nom és massa llarg.");

            return false;

          }

        }




        

//Comprovem que edat sigui un numero, substitum les comes per punts, i que no estigui buida 




 

        var edat = document.forms["fproves"]["edat"].value;

        //comprovam que no estigui buida:

        if (edat == null || edat.length == 0) {

         alert("Heu d'introduir la vostra edat");

            return false;

     } else {

          //substituïm , per .

          edat = edat.replace(",",".");




          //comprovam que és un número

          if( isNaN(edat)) { 

              alert("L'edat ha de ser un número");

              return false;

          }

        }




//Comprovem que com a mínim tingui estudis d'ESO

 

        var index = document.forms["fproves"]["estudis"].selectedIndex;

        if (index==0) {

         alert("Heu de tenir com a mínim estudis d’ESO");

            return false;

     } 

//Comprovem que el correu tingui format correcte

        

      var mail = document.forms["fproves"]["mail"].value;

        var expressio = /\S+@\S+\.\S+/;

        var correcte = expressio.test(mail);

        if (!correcte) {

         alert("L'adreça electrònica no és correcta");

            return false;

     } 

        

        

        return true;

   }

</script>
